---
k3s_version: "{{ k3s_version }}"
k3s_server_location: "/var/lib/rancher/k3s"
k3s_kubeconfig: "{{ k3s_kubeconfig }}"
k3s_datastore_endpoint: "{{ groups['loadbalancers'] | map('extract', target_hosts) | map(attribute='ip') | map('trim') | map('regex_replace', '^(.*)$', 'https://\\1:2379') | join(',') }}"
cluster_context: "{{ k3s_cluster_context }}"
token: "{{ k3s_token }}"
api_port: "{{ k3s_api_port | default(6443) }}"
api_endpoint: "{{ keepalived_vip }}"
extra_server_args: "{{ k3s_extra_server_args }}"
extra_agent_args: "{{ k3s_extra_agent_args }}"
extra_service_envs: "{{ k3s_extra_service_envs }}"
# https://docs.k3s.io/cli/server?_highlight=cluster&_highlight=cidr#networking
cluster_cidr: "10.42.0.0/16"
cluster_cidr_ipv6: "fd42:f3f5:fe50:42::/56"
service_cidr: "10.43.0.0/16"
service_cidr_ipv6: "fd42:f3f5:fe50:43::/112"
cluster_domain: "{{ k3s_dns_domain_name }}"
cluster_dns: "10.43.0.53,fd42:f3f5:fe50:43::53"

longhorn_version: "v1.11.1"
longhorn_backup_target: "{{ longhorn_backup_target | default('') }}"
calico_version: "{{ calico_version | default('v3.30.2') }}"

backup_dir: "{{ backup_dir | default('/tmp/k3s-backup') }}"